  <path d="M40 38.5 C40 38.5 42.5 43 47.5 43 C50.5 43 53 41.5 53 39 C53 36.5 51 35.2 47.5 34 C43.5 32.6 40 30.8 40 27 C40 23.2 43 21 47 21 C51 21 53.5 23.5 53.5 23.5 L51.5 26.5 C51.5 26.5 49.5 24 47 24 C44.8 24 43.2 25.2 43.2 27 C43.2 29 45.2 30 48.5 31.2 C52.5 32.6 56.2 34.5 56.2 39 C56.2 43.5 52.5 46 47.5 46 C42 46 39 42.5 39 42.5 Z"
